<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>IvySets — Market Sentiment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#252522;--muted:#74746e;--soft:#9d9d96;--line:rgba(37,37,34,.11);--paper:#f4f4f0;--panel:rgba(255,255,252,.76);--black:#242421;--orange:#ff5a14;--yellow:#fff86f;--green:#4ed768;--red:#df3f16;--shadow:0 18px 70px rgba(0,0,0,.10)}
    *{box-sizing:border-box}body{margin:0;background:#10100f;color:var(--ink);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}a{color:inherit;text-decoration:none}button{font:inherit}.frame{min-height:100vh;padding:10px;border:10px solid #111;border-radius:25px;background:linear-gradient(135deg,#f7f7f3,#ecece8);overflow:hidden}.app{min-height:calc(100vh - 40px);display:grid;grid-template-columns:76px 1fr;position:relative}.app:before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(37,37,34,.03) 0 1px,transparent 1px 24px),repeating-linear-gradient(90deg,rgba(37,37,34,.025) 0 1px,transparent 1px 24px);pointer-events:none}.rail{position:relative;z-index:2;border-right:1px solid var(--line);display:flex;flex-direction:column;align-items:center;background:rgba(245,245,241,.58)}.brand{width:64px;height:64px;background:var(--yellow);display:grid;place-items:center;margin:14px 0 34px}.mark{width:28px;height:28px;display:grid;grid-template-columns:repeat(7,1fr);gap:2px;transform:rotate(45deg)}.mark i{width:3px;height:3px;border-radius:50%;background:var(--black)}.railnav,.foot{display:flex;flex-direction:column;gap:18px}.foot{margin-top:auto;margin-bottom:18px}.railnav span,.foot span{width:35px;height:35px;display:grid;place-items:center}.railnav .active{box-shadow:inset 3px 0 0 var(--black)}.main{position:relative;z-index:1;padding:34px;display:grid;grid-template-rows:auto auto 1fr;gap:24px}.top{display:flex;justify-content:space-between;align-items:center;gap:24px}.search{font-size:20px;color:var(--muted);letter-spacing:-.04em}.scale{width:270px;color:var(--muted);font-size:13px}.scale div{display:flex;justify-content:space-between;border-bottom:2px solid rgba(37,37,34,.45);padding-bottom:10px}.actions{display:flex;gap:9px;flex-wrap:wrap}.actions a,.actions button{height:42px;border:0;background:rgba(255,255,252,.72);padding:0 15px;cursor:pointer;display:flex;align-items:center}.hero{display:grid;grid-template-columns:minmax(420px,1fr) 420px;gap:24px}.titleBlock{min-height:260px;display:flex;flex-direction:column;justify-content:flex-end}.subtle{color:var(--muted);font-size:15px;margin-bottom:42px}.subtle span{color:var(--ink);font-weight:600}h1{margin:0;font-size:clamp(62px,7.8vw,126px);line-height:.82;letter-spacing:-.095em;font-weight:900}.summary{background:var(--panel);border:1px solid rgba(255,255,255,.66);box-shadow:var(--shadow);display:grid;grid-template-rows:auto 1fr auto}.summaryTop{padding:26px;border-bottom:1px solid var(--line)}.eyebrow{font-size:13px;color:var(--muted);margin-bottom:18px}.bigLabel{font-size:64px;line-height:.92;letter-spacing:-.085em;font-weight:800;margin-bottom:20px}.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.k label{display:block;color:var(--muted);font-size:12px;margin-bottom:8px}.k strong{font-size:28px;letter-spacing:-.06em}.summaryBottom{background:var(--orange);color:white;padding:23px 26px;display:grid;grid-template-columns:1fr auto;gap:16px;align-items:end}.summaryBottom h2{margin:0 0 8px;font-size:24px;letter-spacing:-.055em}.summaryBottom p{margin:0;color:rgba(255,255,255,.84);font-size:13px;line-height:1.45}.score{font-size:60px;line-height:.85;letter-spacing:-.08em;font-weight:700;text-align:right}.score small{font-size:13px;letter-spacing:0}.cards{display:grid;grid-template-columns:repeat(5,minmax(180px,1fr));gap:14px}.card{min-height:190px;background:var(--panel);border:1px solid rgba(255,255,255,.62);box-shadow:0 12px 40px rgba(0,0,0,.055);padding:17px;display:flex;flex-direction:column;position:relative;overflow:hidden}.card:before{content:"";position:absolute;right:-50px;top:-50px;width:120px;height:120px;border-radius:50%;background:rgba(37,37,34,.045)}.card.negative{background:linear-gradient(135deg,rgba(255,255,252,.78),rgba(255,90,20,.16))}.card.positive{background:linear-gradient(135deg,rgba(255,255,252,.78),rgba(78,215,104,.11))}.card.unavailable{opacity:.72}.cardTop{display:flex;justify-content:space-between;gap:12px;margin-bottom:18px;position:relative}.num{font-size:12px;color:var(--soft)}.cat{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}.metric{font-size:19px;line-height:1.03;letter-spacing:-.055em;font-weight:800;min-height:42px;position:relative}.value{font-size:36px;letter-spacing:-.075em;font-weight:800;margin-top:13px;position:relative}.unit{font-size:12px;color:var(--muted);font-weight:500;margin-left:4px;letter-spacing:0}.sig{display:inline-flex;margin-top:12px;height:25px;padding:0 9px;background:rgba(255,255,255,.55);border:1px solid rgba(37,37,34,.08);align-items:center;font-size:12px;position:relative}.detail{margin-top:auto;color:var(--muted);font-size:12px;line-height:1.35;position:relative}.source{margin-top:12px;font-size:11px;color:var(--soft);display:flex;justify-content:space-between;gap:10px;position:relative}.source a{text-decoration:underline;text-underline-offset:3px}.status{display:inline-flex;align-items:center;gap:5px}.status:before{content:"";width:6px;height:6px;border-radius:50%;background:var(--green)}.unavailable .status:before{background:var(--red)}.drawer{position:fixed;inset:auto 22px 22px auto;width:min(760px,calc(100vw - 44px));max-height:72vh;background:rgba(250,250,247,.95);border:1px solid var(--line);box-shadow:0 30px 100px rgba(0,0,0,.22);z-index:30;display:none;flex-direction:column}.drawer.open{display:flex}.drawerHead{height:66px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid var(--line)}.drawerHead strong{font-size:22px;letter-spacing:-.055em}.drawerHead button{border:0;background:var(--black);color:white;height:38px;padding:0 13px;cursor:pointer}.tableWrap{overflow:auto}table{width:100%;border-collapse:collapse;font-size:12px}th,td{text-align:left;padding:11px 13px;border-bottom:1px solid rgba(37,37,34,.08);vertical-align:top}th{position:sticky;top:0;background:#fafaf7;color:var(--muted);font-weight:600}td:nth-child(2),td:nth-child(4){font-weight:700}.toast{position:fixed;right:24px;bottom:24px;background:var(--black);color:white;padding:12px 15px;font-size:12px;opacity:0;transform:translateY(8px);transition:.2s;z-index:40}.toast.show{opacity:1;transform:translateY(0)}@media(max-width:1280px){.cards{grid-template-columns:repeat(4,minmax(180px,1fr))}.hero{grid-template-columns:1fr}}@media(max-width:860px){.frame{padding:0;border:0;border-radius:0}.app{grid-template-columns:1fr}.rail{display:none}.main{padding:22px}.top{align-items:flex-start;flex-direction:column}.scale{display:none}.cards{grid-template-columns:repeat(2,minmax(150px,1fr))}.bigLabel{font-size:48px}.summaryBottom{grid-template-columns:1fr}.score{text-align:left}h1{font-size:64px}.titleBlock{min-height:190px}}@media(max-width:520px){.cards{grid-template-columns:1fr}.actions{flex-wrap:wrap}.summary{min-width:0}}
  </style>
</head>
<body>
  <main class="frame"><section class="app">
    <aside class="rail"><div class="brand"><div class="mark" id="mark"></div></div><nav class="railnav"><span class="active">⌂</span><span>⌕</span><span>▥</span><span>△</span><span>≋</span><span>▣</span><span>▤</span></nav><div class="foot"><span>◌</span><span>⚙</span></div></aside>
    <section class="main"><header class="top"><div class="search">⌕ US market + global macro + watchlist</div><div class="scale"><div><span>Risk-off</span><span>Risk-on</span></div></div><div class="actions"><a id="csvLink" href="docs/sentiment.csv" download>Download CSV</a><button id="copyCsv">Copy CSV</button><button id="openData">Table</button></div></header><section class="hero"><div class="titleBlock"><div class="subtle">Last update <span id="updated">loading</span></div><h1>Market<br>Sentiment</h1></div><aside class="summary"><div class="summaryTop"><div class="eyebrow">IvySets / 20 live-data cards</div><div class="bigLabel" id="label">Loading</div><div class="kpis"><div class="k"><label>Cards</label><strong id="cardsCount">20</strong></div><div class="k"><label>Positive</label><strong id="positive">—</strong></div><div class="k"><label>Negative</label><strong id="negative">—</strong></div></div></div><div class="summaryBottom"><div><h2>Overall score</h2><p id="summaryText">Loading data from configured sources.</p></div><div class="score"><span id="score">0</span><small>/100</small></div></div></aside></section><section class="cards" id="cards"></section></section>
  </section></main>
  <section class="drawer" id="drawer"><div class="drawerHead"><strong>Excel data table</strong><button id="closeDrawer">Close</button></div><div class="tableWrap"><table id="table"><thead><tr><th>#</th><th>Metric</th><th>Symbol</th><th>Value</th><th>Signal</th><th>Detail</th><th>Status</th></tr></thead><tbody></tbody></table></div></section><div class="toast" id="toast">Copied</div>
  <script>
    const $=id=>document.getElementById(id), state={summary:{},rows:[]};for(let i=0;i<49;i++)$('mark').appendChild(document.createElement('i'));
    function toast(t){const e=$('toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1500)}function fmtScore(v){const n=Number(v||0);return (n>0?'+':'')+Math.round(n)}function klass(row){const s=Number(row.score);if(row.status!=='live'||!Number.isFinite(s))return 'unavailable';if(s>=20)return 'positive';if(s<=-20)return 'negative';return ''}
    function renderCards(){const wrap=$('cards');wrap.innerHTML='';state.rows.slice().sort((a,b)=>(a.card||0)-(b.card||0)).forEach(row=>{const el=document.createElement('article');el.className=`card ${klass(row)}`;el.innerHTML=`<div class="cardTop"><span class="num">${String(row.card||'').padStart(2,'0')}</span><span class="cat">${row.category||''}</span></div><div class="metric">${row.metric||''}</div><div class="value">${row.value||'Unavailable'}<span class="unit">${row.unit||''}</span></div><span class="sig">${row.signal||'Unavailable'}</span><div class="detail">${row.detail||''}</div><div class="source"><a href="${row.source_url||'#'}" target="_blank" rel="noreferrer">${row.source||'Source'}</a><span class="status">${row.status||'unavailable'}</span></div>`;wrap.appendChild(el)})}
    function renderTable(){const body=$('table').querySelector('tbody');body.innerHTML='';state.rows.slice().sort((a,b)=>(a.card||0)-(b.card||0)).forEach(row=>{const tr=document.createElement('tr');tr.innerHTML=`<td>${row.card||''}</td><td>${row.metric||''}</td><td>${row.symbol||''}</td><td>${row.value||''} ${row.unit||''}</td><td>${row.signal||''}</td><td>${row.detail||''}</td><td>${row.status||''}</td>`;body.appendChild(tr)})}
    function render(){const s=state.summary||{};$('label').textContent=s.overall_label||'Unavailable';$('score').textContent=fmtScore(s.overall_score);$('cardsCount').textContent=s.card_count||state.rows.length||20;$('positive').textContent=s.positive_cards??'—';$('negative').textContent=s.negative_cards??'—';$('updated').textContent=(s.updated_at_london||'unavailable').replace('T',' ');$('summaryText').textContent=`${s.overall_label||'Unavailable'} across ${s.card_count||state.rows.length||20} configured cards. Unavailable sources are clearly marked and not replaced with fake values.`;renderCards();renderTable()}
    async function load(){let res;try{res=await fetch('docs/data.json?ts='+Date.now());if(!res.ok)throw new Error('docs failed');const data=await res.json();state.summary=data.summary||{};state.rows=data.metrics||[]}catch(e){state.summary={overall_label:'Unavailable',overall_score:0,card_count:0,positive_cards:0,negative_cards:0,updated_at_london:'data load failed'};state.rows=[]}render()}
    async function copyCsv(){try{const text=await (await fetch('docs/sentiment.csv?ts='+Date.now())).text();await navigator.clipboard.writeText(text);toast('CSV copied')}catch(e){toast('Copy failed')}}$('copyCsv').onclick=copyCsv;$('openData').onclick=()=>$('drawer').classList.add('open');$('closeDrawer').onclick=()=>$('drawer').classList.remove('open');document.addEventListener('keydown',e=>{if(e.key==='Escape')$('drawer').classList.remove('open')});load();setInterval(load,300000);
  </script>
</body>
</html>
